server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug" # debug | release

auth:
  jwt_secret: "" # Set via DG_AUTH_JWT_SECRET env var, auto-generated if empty in debug mode
  jwt_expire: "24h"

crypto:
  master_key: "1a83301a1400e79b35560ea528eb113a861bd2e8bc6c1980b14ef2b9373a1985"

database:
  driver: "sqlite" # sqlite | mongodb
  sqlite:
    path: "./data/device_grid.db"
  mongodb:
    uri: "mongodb://localhost:27017"
    database: "device_grid"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

agent:
  grpc_port: 9090
  ca_cert: "./configs/certs/ca.crt"
  server_cert: "./configs/certs/server.crt"
  server_key: "./configs/certs/server.key"
  agent_cert: "./configs/certs/agent.crt"
  agent_key: "./configs/certs/agent.key"

ssh:
  key_algorithm: "ed25519" # ed25519 | rsa
  connect_timeout: "10s"
  keepalive_interval: "30s"
  max_connections: 50

deploy:
  max_concurrent: 20
  timeout: "30m"

network:
  environment: "public"  # public | internal
  # When set to "internal", all public-network features are disabled:
  # - IP geo lookup
  # - Streaming unlock detection
  # - AI service availability
  # - Global connectivity test
  # - China ISP return route test
  # You can override individual features by setting them to true/false:
  # enable_geo: false
  # enable_streaming: false
  # enable_ai: false
  # enable_connectivity: false
  # enable_route: false
