name: Build and Release

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2026.6.15)'
        required: false
        default: ''

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'

jobs:
  # ===== Backend: lint + test =====
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: cd web && npm ci || npm install

      - name: Build frontend (for go:embed)
        run: cd web && npm run build

      - name: Sync dist for embed
        run: |
          rm -rf internal/web/dist
          cp -r web/dist internal/web/dist

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Check gofmt
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::The following files need gofmt:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Check goimports
        run: |
          UNFORMATTED=$(goimports -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::The following files need goimports:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Test
        run: go test -race -timeout 120s ./...

      - name: Build server
        run: go build -o bin/devicegrid-server ./cmd/server

      - name: Build agent
        run: go build -o bin/devicegrid-agent ./cmd/agent

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ github.sha }}
          path: bin/
          retention-days: 7

  # ===== Frontend: typecheck + build =====
  frontend:
    name: Frontend (Vue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci || npm install

      - name: Type check
        run: cd web && npx vue-tsc --noEmit

      - name: Build
        run: cd web && npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: web/dist/
          retention-days: 7

  # ===== Release: single binary + deb + GitHub Release =====
  release:
    name: Release Package
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: cd web && npm ci || npm install

      - name: Build frontend
        run: cd web && npm run build

      - name: Embed frontend
        run: |
          rm -rf internal/web/dist
          cp -r web/dist internal/web/dist

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(date +'%Y.%-m.%-d')" >> $GITHUB_OUTPUT
          fi

      - name: Build server binary (amd64)
        run: GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/devicegrid-server-amd64 ./cmd/server

      - name: Build agent binary (amd64)
        run: GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/devicegrid-agent-amd64 ./cmd/agent

      - name: Build agent binary (arm64)
        run: GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o dist/devicegrid-agent-arm64 ./cmd/agent

      - name: Create deb package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist/deb/DEBIAN dist/deb/usr/local/bin dist/deb/usr/local/lib/devicegrid/configs dist/deb/etc/systemd/system
          cp dist/devicegrid-server-amd64 dist/deb/usr/local/bin/devicegrid-server
          cp dist/devicegrid-agent-amd64 dist/deb/usr/local/bin/devicegrid-agent
          cp configs/config.yaml dist/deb/usr/local/lib/devicegrid/configs/
          cat > dist/deb/DEBIAN/control << EOF
          Package: devicegrid
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: DeviceGrid <noreply@devicegrid.dev>
          Depends: libc6
          Description: DeviceGrid - Server Fleet Management Platform
           SSH + Agent dual-mode, real-time monitoring, Docker lifecycle,
           batch deployment, and RKE2 orchestration.
          Section: admin
          Priority: optional
          Homepage: https://github.com/ColorDanio/DeviceGrid
          EOF
          cat > dist/deb/DEBIAN/postinst << 'EOF2'
          #!/bin/bash
          set -e
          mkdir -p /var/lib/devicegrid/data /etc/devicegrid
          [ ! -f /etc/devicegrid/config.yaml ] && cp /usr/local/lib/devicegrid/configs/config.yaml /etc/devicegrid/config.yaml
          systemctl daemon-reload 2>/dev/null || true
          echo ""
          echo "DeviceGrid installed successfully!"
          echo "  Config: /etc/devicegrid/config.yaml"
          echo "  Data:   /var/lib/devicegrid/data/"
          echo ""
          echo "  sudo systemctl enable --now devicegrid"
          echo "  Default login: admin / admin123 (change immediately!)"
          EOF2
          chmod 755 dist/deb/DEBIAN/postinst
          cat > dist/deb/etc/systemd/system/devicegrid.service << 'EOF3'
          [Unit]
          Description=DeviceGrid Server
          After=network.target
          [Service]
          Type=simple
          ExecStart=/usr/local/bin/devicegrid-server
          Environment=DG_CONFIG_PATH=/etc/devicegrid/config.yaml
          WorkingDirectory=/var/lib/devicegrid
          Restart=always
          RestartSec=5
          LimitNOFILE=65536
          [Install]
          WantedBy=multi-user.target
          EOF3
          dpkg-deb --build --root-owner-group dist/deb dist/devicegrid-${VERSION}-amd64.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: |
            dist/devicegrid-server-amd64
            dist/devicegrid-agent-amd64
            dist/devicegrid-agent-arm64
            dist/*.deb
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: DeviceGrid v${{ steps.version.outputs.version }}
          body: |
            ## DeviceGrid v${{ steps.version.outputs.version }}

            ### Downloads
            | File | Architecture | Description |
            |---|---|---|
            | `devicegrid-server-amd64` | x86_64 | Server binary (with embedded frontend) |
            | `devicegrid-agent-amd64` | x86_64 | Agent for x86_64 nodes |
            | `devicegrid-agent-arm64` | arm64 | Agent for ARM64 nodes |
            | `devicegrid-*-amd64.deb` | x86_64 | Ubuntu/Debian package with systemd service |

            ### Quick Start (deb)
            ```bash
            sudo dpkg -i devicegrid-*.deb
            sudo systemctl enable --now devicegrid
            ```
            Then open `http://<server-ip>:8080` — Login: `admin` / `admin123`

            ### Quick Start (binary)
            ```bash
            chmod +x devicegrid-server-amd64
            ./devicegrid-server-amd64
            ```

            ### Deploy Agent on a Node
            ```bash
            # x86_64
            ./devicegrid-agent-amd64 -server <server-ip>:9090 -node-id <id> -node-name <name>
            # ARM64
            ./devicegrid-agent-arm64 -server <server-ip>:9090 -node-id <id> -node-name <name>
            ```
          files: |
            dist/devicegrid-server-amd64
            dist/devicegrid-agent-amd64
            dist/devicegrid-agent-arm64
            dist/*.deb
          draft: false
          prerelease: false
